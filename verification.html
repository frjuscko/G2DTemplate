<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="shortcut icon" href="logo-G2D-color.png" type="image/png">
    <!--- IGNORE --->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/verification.css">
    <title>Verification G2D</title>
</head>

<body>
    <main>
        <div class="logo">
            <a href="index.html" class="logo-link"><img src="img/logo-G2D-color.png" alt srcset> G2D
                Bénin</a>
        </div>
        <div class="steps">
            <div class="step">
                <div class="number active">1</div>
                <p class="text index">Inscription</p>
            </div>
            <hr class="index">
            <div class="step">
                <div class="number active">2</div>
                <p class="text index">Vérification email</p>
            </div>
            <hr>
            <div class="step">
                <div class="number">3</div>
                <p class="text">Abonnement</p>
            </div>
        </div>

        <div class="container">
            <div class="thanks">
                <h2>Merci !</h2>
            </div>

            <div class="card verification-card">
                <div class="icon-container">
                    <svg class="icon-bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M3 3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3ZM20 7.23792L12.0718 14.3307L4 7.21594V19H20V7.23792ZM4.51146 5L12.0619 11.662L19.501 5H4.51146Z">
                        </path>
                    </svg>
                    <div class="icon-main-wrapper">
                        <svg class="icon-main" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="currentColor">
                            <path
                                d="M3 3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3ZM20 7.23792L12.0718 14.3307L4 7.21594V19H20V7.23792ZM4.51146 5L12.0619 11.662L19.501 5H4.51146Z">
                            </path>
                        </svg>
                    </div>
                </div>

                <div class="profil-info text-center">
                    <h4 class="name">Veuillez procéder à la vérification de votre email</h4>

                    <p class="description">
                        Un lien a été envoyé à <strong>abc123@gmail.com</strong>. Si vous ne le trouvez pas, vérifiez
                        vos spam.
                    </p>
                </div>

                <div class="action-container text-center">
                    <a href="#" class="link-cancel">Ce n'est pas moi</a>
                </div>
            </div>
        </div>
    </main>
    <svg class="cercle un"></svg>
    <svg class="cercle deux"></svg>
    <svg class="cercle trois"></svg>
</body>

</html>
