<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link rel="shortcut icon" href="logo-G2D-color.png" type="image/png">
            <!--- IGNORE --->
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Quicksand:wght@300..700&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="css/login.css">
        <title>Connexion G2D</title>
    </head>
    <body>
        <main>
            <div class="logo">
                <a href="index.html" class="logo-link"><img
                        src="img/logo-G2D-color.png" alt srcset> G2D
                    Bénin</a>
            </div>
            <div class="container">
                <div class="part left">
                    <div class="links">
                        <p class="index"><a href="login.html">Se
                                connecter</a></p>
                        <p><a href="register.html">S'inscrire</a></p>
                    </div>
                    <form action method>
                        <div class="form">
                            <div class="input-box">
                                <input type="email" required>
                                <label for>Email</label>
                            </div>
                            <div class="input-box">
                                <input type="password" id="password" required>
                                <label for>Mot de passe</label>
                            </div>
                            <div class="btns">
                                <button
                                    class="reg btn--blue">Se connecter</button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="part right">
                    <div class="bg"></div>
                    <img src="img/Enko-John-Wesley_Abidjan-1024x630.jpg" alt
                        srcset>
                </div>
            </div>
        </main>
        <svg class="cercle un"></svg>
        <svg class="cercle deux"></svg>
        <svg class="cercle trois"></svg>
    </body>
</html>
