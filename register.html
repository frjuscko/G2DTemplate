<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Quicksand:wght@300..700&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="css/register.css">
        <script src="js/register.js" defer></script>
        <title>Inscription G2D</title>
    </head>
    <body>
        <main>
            <div class="logo">
                <a href="index.html" class="logo-link"><img
                        src="img/logo-G2D-color.png" alt srcset> G2D
                    Bénin</a>
            </div>
            <div class="steps">
                <div class="step">
                    <div class="number active">1</div>
                    <p class="text index">Inscription</p>
                </div>
                <hr>
                <div class="step">
                    <div class="number">2</div>
                    <p class="text">Vérification email</p>
                </div>
                <hr>
                <div class="step">
                    <div class="number">3</div>
                    <p class="text">Abonnement</p>
                </div>
            </div>

            <div class="container">
                <div class="part left">
                    <div class="links">
                        <p><a href="login.html">Se connecter</a></p>
                        <p class="index"><a
                                href="register.html">S'inscrire</a></p>
                    </div>
                    <form action method>
                        <div class="form">
                            <div class="slides">
                                <div class="slide">
                                    <div class="input-box">
                                        <input type="text" required>
                                        <label for>Nom</label>
                                    </div>
                                    <div class="input-box">
                                        <input type="text" required>
                                        <label for>Prénom(s)</label>
                                    </div>
                                    <h4>Sexe</h4>
                                    <div class="choice-zone">
                                        <input type="radio" name id><label
                                            for>Masculin</label>
                                        <input type="radio" name id><label
                                            for>Féminin</label>
                                    </div>
                                    <div class="btn">
                                        <button class="next btn--blue">Suivant
                                            <span>→</span></button>
                                    </div>
                                </div>
                                <div class="slide">
                                    <div class="input-box">
                                        <input type="email" required>
                                        <label for>Email</label>
                                    </div>
                                    <div class="input-box">
                                        <input type="number" required>
                                        <label for>Téléphone</label>
                                    </div>
                                    <div class="input-box">
                                        <input type="password" id="password"
                                            required>
                                        <label for>Mot de passe</label>
                                    </div>
                                    <div class="input-box">
                                        <input type="password" id="pass"
                                            required>
                                        <label for>Confirmez votre mot de
                                            passe</label>
                                    </div>
                                    <div class="btns">
                                        <button
                                            class="preview"><span>←</span>Précédent</button>
                                        <button
                                            class="reg btn--blue">S'inscrire</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="part right">
                    <img src="img/3551.jpg" alt srcset>
                </div>
            </div>
        </main>
        <svg class="cercle un"></svg>
        <svg class="cercle deux"></svg>
        <svg class="cercle trois"></svg>
    </body>
</html>
