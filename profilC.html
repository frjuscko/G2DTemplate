            <div class="profil-right">
                <h2>Informations Personnelles</h2>
                <h3>Homme</h3>
                <form id="contactForm" action="" method="POST">
                    <div class="news">
                        <div class="name-news">
                            <label for="lastname">Nom</label>
                            <input type="text" id="lastname" name="lastname" placeholder="lastname" required>
                        </div>
                        <div class="name-news">
                            <label for="firstname">Prenom(s)</label>
                            <input type="text" id="firstname" name="firstname" placeholder="firstname" required>
                        </div>
                    </div>
                    <div class="items">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email"
                            pattern="[a-z,.]{4,30}@(hotmail|yahoo|gmail)\.(fr|com|bj|[a-z]{2,})"
                            title="veuillez entrer une adresse e-mail valide avec au moins 10 caractères avant le'@', utlisant les domaines hotmail,gamail ou yahoo, et les extensions fr, com, bj ou toutes les autres extensions de deux lettres"
                            placeholder="yourname@gmail.com" required>

                    </div>
                    <div class="news">
                        <div class="name-news">
                            <label for="adress">Adresse</label>
                            <input type="text" id="adress" name="adress" placeholder="adress" required>
                        </div>
                        <div class="name-news">
                            <label for="city">Ville</label>
                            <input type="text" id="city" name="city" placeholder="city" required>
                        </div>
                    </div>

                    <div class="news">
                        <div class="name-news">
                            <label for="nationality">Nationalité</label>
                            <input type="text" id="nationality" name="nationality" placeholder="nationality" required>
                        </div>
                        <div class="name-news">
                            <label for="phone_number">Téléphone</label>
                            <input type="tel" id="phone_number" name="phone_number" placeholder="01466620346" required
                                pattern="[0-9]{10}" title="veuillez entrer numero à 10 chiffres">
                        </div>
                    </div>

                    <button type="submit">Envoyer</button>
                    <button type="reset">Annuler</button>
                </form>
            </div>
